<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <title>Contact - Renardeaux</title>
        <link rel="shortcut icon" href="logo2.png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="contact.css">
    </head>
    <body>
        <header>
            <a href="index.html"><img src="logo2.png" class="logo" alt="Logo"></a>
            <nav>
                <ul>
                    <li><a href="actualites.html">Actualités</a></li>
                    <li><a href="materiel.html">Matériel</a></li>
                    <li><a href="map.html">Carte</a></li>
                    <li><a href="galerie.html">Galerie</a></li>
                    <li><b class="active">Contact</b></li>
                </ul>
            </nav>
        </header>

        <main>
            <form id="contactForm">
                <h2 style="text-align: center; color: var(--primary-orange);">Me contacter</h2>
                
                <label for="name">Nom :</label>
                <input type="text" id="name" name="name" placeholder="Ton nom" required />

                <label for="email">Email :</label>
                <input type="email" id="email" name="email" placeholder="ton@email.com" required />

                <label for="message">Message :</label>
                <textarea id="message" name="message" rows="5" placeholder="Ton message..." required></textarea>

                <button type="submit" id="submitBtn">Envoyer le message</button>

                <p style="text-align: center; margin-top: 15px; font-size: 0.8em;">Je vous répondrai par mail dès que possible.</p>
            </form>
        </main>

        <footer>
            <div class="social-links">
                <a href="https://discord.gg/WNBzpjzqX" target="_blank">Discord</a>
                <a href="https://instagram.com/renardeau73" target="_blank">Instagram</a>
                <a href="https://www.youtube.com/@renard-73" target="_blank">YouTube</a>
            </div>
            <p>&copy; 2026 Renardeaux</p>
        </footer>

        <script src="contact.js"></script>
    </body>
</html>
